<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html,
    body,
    #root {
      width: 100%;
      height: 100%;
      margin: 0;
      background-color: #f8fafc;
    }

    html {
      color-scheme: light;
    }

    html.dark,
    html.dark body,
    html.dark #root {
      background-color: #0a0a0a;
    }

    html.dark {
      color-scheme: dark;
    }
  </style>
  <script>
    (function () {
      try {
        var storedMode = localStorage.getItem("annota.themeMode");
        var storedAccent = localStorage.getItem("annota.accentColor");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = storedMode === "dark" || (storedMode !== "light" && prefersDark);
        var root = document.documentElement;
        if (isDark) {
          root.classList.add("dark");
        }
        if (storedAccent) {
          root.style.setProperty("--accent", storedAccent + "65");
          root.style.setProperty("--accent-full", storedAccent);
        }
      } catch (e) {
        // no-op: keep defaults
      }
    })();
  </script>
  <title>Annota</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
